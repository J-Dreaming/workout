<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Daily Walk">
  <title>Daily Walk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #FAF0E4; min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #D4B896; border-radius: 2px; }
    textarea, input { outline: none; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes glow { 0%,100% { box-shadow: 0 0 10px rgba(196,135,31,0.25); } 50% { box-shadow: 0 0 22px rgba(196,135,31,0.55); } }
    @keyframes shimmer { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade { animation: fadeUp 0.5s ease both; }
    .glow { animation: glow 2.5s ease-in-out infinite; }
    .habit-row { transition: all 0.2s ease; cursor: pointer; }
    .habit-row:hover { transform: translateX(3px); }
    .sk { animation: shimmer 1.8s ease-in-out infinite; border-radius: 4px; background: #EDE0CD; }
    .pcard { animation: fadeUp 0.5s ease both; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .pcard:hover { transform: translateY(-5px); box-shadow: 0 18px 44px rgba(28,16,8,0.16) !important; }
</style>
