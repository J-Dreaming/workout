/* header */
.hdr{padding:calc(env(safe-area-inset-top) + 14px) 16px 12px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start;}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.streak{text-align:right;}
.streak-n{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--amber);line-height:1;}
.streak-l{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.wdots{display:flex;gap:5px;margin-top:10px;}
.wdot{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;text-transform:uppercase;}
.wdot.done{background:var(--green);color:#000;}
.wdot.today{background:var(--accent);color:#000;}
.wdot.rest{background:var(--card2);color:var(--muted);border:1px solid var(--border);}
.wdot.missed{background:var(--card2);color:var(--red);border:1px solid var(--red);opacity:.5;}

/* tabs */
.dtabs{display:flex;background:var(--card);border-bottom:2px solid var(--border);flex-shrink:0;}
.dtab{flex:1;padding:10px 2px 8px;border:none;background:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:3px;}
.dtab.on{color:var(--dc,var(--accent));border-bottom-color:var(--dc,var(--accent));}
.dtab-icon{font-size:16px;}
.stabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;}
.stab{flex:1;padding:11px 4px;border:none;background:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid transparent;}
.stab.on{color:var(--accent);border-bottom-color:var(--accent);}

/* scroll */
.sbody{flex:1;overflow-y:auto;padding:14px 14px 24px;-webkit-overflow-scrolling:touch;}

/* bottom nav */
.bnav{display:flex;background:var(--card);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom);flex-shrink:0;}
.bnav-btn{flex:1;padding:10px 4px 8px;border:none;background:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);border-top:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bnav-btn.on{color:var(--accent);border-top-color:var(--accent);}
.bnav-icon{font-size:20px;}

/* plan */
.fmt{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--dc,var(--accent));border-radius:0 10px 10px 0;padding:10px 14px;margin-bottom:12px;}
.fmt-lbl{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--dc,var(--accent));margin-bottom:3px;}
.fmt-txt{font-size:12px;color:var(--muted);line-height:1.5;}
.wu{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start;}
.wu-lbl{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.wu-txt{font-size:12px;line-height:1.5;}
.blk{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;cursor:pointer;}
.blk.open{border-color:var(--dc,var(--accent));}
.blk-hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:var(--card2);border-bottom:1px solid var(--border);}
.blk-num{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--dc,var(--accent));}
.blk-body{padding:12px 14px 0;}
.lift-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;}
.sets-pill{border-radius:7px;padding:5px 10px;font-size:11px;font-weight:800;white-space:nowrap;flex-shrink:0;background:var(--dc,var(--accent));color:#000;}
.ex-name{font-size:14px;font-weight:700;line-height:1.3;}
.form-tip{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4;display:none;}
.form-tip.show{display:block;}
.connector{display:flex;align-items:center;gap:8px;padding:5px 0;}
.conn-line{height:1px;background:var(--border);flex:1;}
.conn-txt{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--dc,var(--accent));opacity:.8;white-space:nowrap;}
.hiit-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;}
.dur-pill{border-radius:7px;padding:5px 10px;font-size:11px;font-weight:800;white-space:nowrap;flex-shrink:0;background:transparent;border:2px solid var(--dc,var(--accent));color:var(--dc,var(--accent));}
.blast-lbl{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--amber);margin-top:3px;}
.rest-bar{border-top:1px solid var(--border);padding:8px 0;display:flex;align-items:center;gap:6px;color:var(--muted);font-size:11px;font-weight:600;}
.fin{border:1px solid var(--dc,var(--accent));border-radius:12px;padding:14px;margin-bottom:12px;background:var(--card);}
.fin-lbl{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--dc,var(--accent));margin-bottom:6px;}
.fin-txt{font-size:13px;font-weight:500;line-height:1.5;}
.formula{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;justify-content:space-around;align-items:center;}
.fw{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--dc,var(--accent));}
.fa{color:var(--border);font-size:12px;}
.tips-btn{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.tips-body{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px;display:none;}
.tips-body.show{display:block;}
.tip-row{display:flex;gap:12px;padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid var(--border);}
.tip-row:last-child{padding-bottom:0;margin-bottom:0;border-bottom:none;}

/* tracker */
.sec-lbl{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin:16px 0 10px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.card-hdr{padding:10px 14px;background:var(--card2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.card-title{font-size:14px;font-weight:700;}
.card-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.card-body{padding:12px 14px;}
.set-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.set-lbl{font-size:11px;font-weight:700;color:var(--muted);width:40px;flex-shrink:0;}
.set-wrap{display:flex;align-items:center;gap:4px;flex:1;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;}
.set-inp{background:none;border:none;color:var(--text);font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;width:52px;text-align:center;outline:none;}
.set-inp::placeholder{color:var(--soft);font-weight:400;}
.set-unit{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;}
.set-div{color:var(--border);font-size:14px;}
.set-del{background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:4px;flex-shrink:0;opacity:.6;}
.btn{border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-weight:700;cursor:pointer;}
.btn:active{opacity:.75;}
.btn-sm{padding:7px 14px;font-size:12px;}
.btn-full{width:100%;padding:14px;font-size:15px;}
.btn-accent{background:var(--accent);color:#000;}
.btn-green{background:var(--green);color:#000;}
.btn-outline{background:none;border:1px solid var(--border);color:var(--muted);}
.btn-muted{background:var(--card2);color:var(--muted);border:1px solid var(--border);}
.form-lbl{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block;}
.form-inp{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;color:var(--text);outline:none;}
.form-inp:focus{border-color:var(--accent);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.stat-row:last-child{border-bottom:none;}
.done-banner{background:var(--green);border-radius:12px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.rest-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;text-align:center;margin-bottom:12px;}
.hist-entry{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.hist-hdr{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.pill-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.pill{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;}
.pill.pr{border-color:var(--amber);color:var(--amber);}
.pr-tag{font-size:9px;font-weight:800;background:var(--amber);color:#000;border-radius:4px;padding:1px 5px;margin-left:6px;}
.body-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.body-row:last-child{border-bottom:none;}
.empty{text-align:center;padding:36px 20px;color:var(--muted);}

.fade{animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

function loadDB() {
try {

if (raw) return JSON.parse(raw);

// ── HELPERS ────────────────────────────────────────────────────────────────
function todayKey() {
var d = new Date();
var m = String(d.getMonth()+1).padStart(2,“0”);
var day = String(d.getDate()).padStart(2,“0”);
return d.getFullYear() + “-” + m + “-” + day;
}
function todayDow() { return new Date().getDay(); }

function formatDate(str) {
var parts = str.split(”-”);
return MONTHS[parseInt(parts[1])-1] + “ “ + parseInt(parts[2]) + “, “ + parts[0];
}

function getStreak() {
var count = 0;
var d = new Date();
for (var i = 0; i < 60; i++) {
var m = String(d.getMonth()+1).padStart(2,“0”);
var day = String(d.getDate()).padStart(2,“0”);
var key = d.getFullYear() + “-” + m + “-” + day;
var dow = d.getDay();
if (WORKOUT_DAYS.indexOf(dow) >= 0) {
if (db.workouts[key] && db.workouts[key].completed) {
count++;
} else if (key !== todayKey()) {
break;
}
}
d.setDate(d.getDate() - 1);
}
return count;
}

function getWeekDots() {
var now = new Date();
var mon = new Date(now);
mon.setDate(now.getDate() - ((now.getDay() + 6) % 7));
var dots = [];
for (var i = 0; i < 7; i++) {
var d = new Date(mon);
d.setDate(mon.getDate() + i);
var m = String(d.getMonth()+1).padStart(2,“0”);
var day = String(d.getDate()).padStart(2,“0”);
var key = d.getFullYear() + “-” + m + “-” + day;
var dow = d.getDay();
var isToday = key === todayKey();
var isWorkoutDay = WORKOUT_DAYS.indexOf(dow) >= 0;
var isDone = db.workouts[key] && db.workouts[key].completed;
var isPast = d < new Date() && !isToday;
var cls = “rest”;
if (isDone) cls = “done”;
else if (isToday && isWorkoutDay) cls = “today”;
else if (isPast && isWorkoutDay) cls = “missed”;
dots.push({ label: DAY_NAMES[dow][0], cls: cls });
}
return dots;
}

function getPR(exercise) {
var best = 0;
var keys = Object.keys(db.workouts);
for (var i = 0; i < keys.length; i++) {
var w = db.workouts[keys[i]];
var sets = w.exercises && w.exercises[exercise];
if (sets) {
for (var j = 0; j < sets.length; j++) {
if (sets[j].weight > best) best = sets[j].weight;
}
}
}
return best;
}

function getLastSession(exercise) {
var sortedKeys = Object.keys(db.workouts).sort().reverse();
for (var i = 0; i < sortedKeys.length; i++) {
var key = sortedKeys[i];
if (key === todayKey()) continue;
var sets = db.workouts[key] && db.workouts[key].exercises && db.workouts[key].exercises[exercise];
if (sets && sets.length > 0) return sets;
}
return null;
}

function ensureToday() {
var key = todayKey();
var dow = todayDow();
if (!db.workouts[key]) {
db.workouts[key] = { day: dow, completed: false, exercises: {} };
}
return db.workouts[key];
