<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Daily Walk">
  <title>Daily Walk</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:#FAF0E4;min-height:100vh}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .card{animation:fadeUp .5s ease both;cursor:pointer;transition:transform .2s}
    .card:hover{transform:translateY(-4px)}
  </style>
</head>
<body>
<div id="app"></div>
<script>
window.onerror = function(msg,src,line) {
  document.getElementById('app').innerHTML = '<div style="padding:2rem;background:white;min-height:100vh;font-family:sans-serif"><h2 style="color:red">Error line '+line+'</h2><p>'+msg+'</p></div>';
  return true;
};

var profiles = [
{name:‘Joshua’,color:’#C4871F’,grad:‘linear-gradient(145deg,#1A1200,#4A3000,#B8860B)’,icon:’\u271D’,tag:‘Walk humbly with your God’},
{name:‘Nicole’,color:’#8A4A6A’,grad:‘linear-gradient(145deg,#1A0010,#5A1A3A,#8A4A6A)’,icon:’\u2726’,tag:‘Clothed with strength and dignity’}
];

var h = new Date().getHours();
var greeting = h < 12 ? ‘Good Morning’ : h < 17 ? ‘Good Afternoon’ : ‘Good Evening’;

function showTracker(name) {
var now = new Date();
var days = [‘Sunday’,‘Monday’,‘Tuesday’,‘Wednesday’,‘Thursday’,‘Friday’,‘Saturday’];
var months = [‘January’,‘February’,‘March’,‘April’,‘May’,‘June’,‘July’,‘August’,‘September’,‘October’,‘November’,‘December’];
document.getElementById(‘app’).innerHTML =
‘<div style="font-family:Raleway,sans-serif;background:#FAF0E4;min-height:100vh;max-width:480px;margin:0 auto;padding:2rem 1.5rem">’ +
‘<div style="font-family:Cormorant Garamond,serif;font-size:1.9rem;font-weight:300;color:#1C1008;margin-bottom:.25rem">’ + greeting + ‘, ’ + name + ’ \u2728</div>’ +
‘<div style="font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:#A08060;margin-bottom:1.5rem">’ + days[now.getDay()] + ’, ’ + months[now.getMonth()] + ’ ’ + now.getDate() + ‘</div>’ +
‘<div style="background:white;border-radius:14px;padding:1.5rem;border:1px solid #EDE0CD;text-align:center">’ +
‘<div style="font-family:Cormorant Garamond,serif;font-size:1.2rem;font-style:italic;color:#C4871F;margin-bottom:1rem">\u201CThis is the day the Lord has made; we will rejoice and be glad in it.\u201D</div>’ +
‘<div style="font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:#C4871F;font-weight:600">Psalm 118:24</div>’ +
‘</div>’ +
‘<button onclick="showPicker()" style="margin-top:1rem;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:#C4A882;background:rgba(255,255,255,.6);border:1px solid #EDE0CD;border-radius:20px;padding:.4rem .9rem;cursor:pointer">Switch User</button>’ +
‘</div>’;
}

function showPicker() {
var html = ‘<div style="min-height:100vh;background:#FAF0E4;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;font-family:Raleway,sans-serif">’;
html += ‘<div style="text-align:center;margin-bottom:2rem">’;
html += ‘<div style="font-family:Cormorant Garamond,serif;font-size:.7rem;letter-spacing:.28em;text-transform:uppercase;color:#C4A882;margin-bottom:.5rem">Daily Walk</div>’;
html += ‘<div style="font-family:Cormorant Garamond,serif;font-size:2.4rem;font-weight:300;color:#1C1008">’ + greeting + ‘</div>’;
html += ‘<div style="font-family:Cormorant Garamond,serif;font-style:italic;font-size:1rem;color:#A08060;margin-top:.4rem">Who is walking with God today?</div>’;
html += ‘</div>’;
html += ‘<div style="display:flex;gap:1rem;width:100%;max-width:420px">’;
for (var i = 0; i < profiles.length; i++) {
var p = profiles[i];
html += ‘<div class="card" onclick="selectProfile(' + i + ')" style="flex:1;border-radius:18px;overflow:hidden;box-shadow:0 8px 28px rgba(28,16,8,.12)">’;
html += ‘<div style="height:140px;background:' + p.grad + ';display:flex;align-items:center;justify-content:center">’;
html += ‘<div style="font-family:Cormorant Garamond,serif;font-size:3rem;color:rgba(255,255,255,.9)">’ + p.icon + ‘</div>’;
html += ‘</div>’;
html += ‘<div style="padding:1rem;background:white;text-align:center">’;
html += ‘<div style="font-family:Cormorant Garamond,serif;font-size:1.5rem;font-weight:600;color:#1C1008;margin-bottom:.3rem">’ + p.name + ‘</div>’;
html += ‘<div style="font-family:Cormorant Garamond,serif;font-style:italic;font-size:.7rem;color:#A08060">’ + p.tag + ‘</div>’;
html += ‘</div></div>’;
}
html += ‘</div>’;
html += ‘<div style="margin-top:2rem;text-align:center;font-family:Cormorant Garamond,serif;font-style:italic;font-size:.85rem;color:#C4A882">’;
html += ‘“As for me and my house, we will serve the Lord”</div>’;
html += ‘<div style="font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:#D4B896;margin-top:.3rem">Joshua 24:15</div>’;
html += ‘</div>’;
document.getElementById(‘app’).innerHTML = html;
}

function selectProfile(i) {
showTracker(profiles[i].name);
}

showPicker();
</script>

</body>
</html>
